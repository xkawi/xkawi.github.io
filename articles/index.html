---
layout: default
title: Writing
---
<div class="articles-listing">
  <div class="panel-inner">
    <h2 class="panel-label">All Writing</h2>
    <ul class="articles-listing-list">
      {% for post in site.posts %}
      <li class="articles-listing-item">
        <a href="{{ post.url | relative_url }}" class="articles-listing-link">
          <div class="articles-listing-meta">
            {% for tag in post.tags limit:1 %}
              <span class="article-tag">{{ tag }}</span>
            {% endfor %}
            <span class="article-date">{{ post.date | date: "%B %Y" }}</span>
          </div>
          <h3 class="articles-listing-title">{{ post.title }}</h3>
          <p class="articles-listing-excerpt">{{ post.description }}</p>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
</div>
