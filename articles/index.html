---
layout: default
title: Writing
---
<div class="articles-listing">
  <div class="panel-inner">
    <h2 class="panel-label">All Writing</h2>
    <ul class="article-list articles-listing-list">
      {% for post in site.posts %}
      <li class="article-item">
        <a href="{{ post.url | relative_url }}" class="article-link">
          <div class="article-text">
            <h3 class="article-title">{{ post.title }}</h3>
            <p class="article-excerpt">{{ post.description }}</p>
          </div>
          <span class="article-meta">
            {% for tag in post.tags limit:1 %}
              <span class="article-tag">{{ tag }}</span>
            {% endfor %}
            <span class="article-date">{{ post.date | date: "%Y" }}</span>
          </span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
</div>
